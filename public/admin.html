<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMANDO TI - Central Administrativa Delta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), 
                        url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; color: #eee; 
            font-size: 0.85rem; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0;
        }
        .header-adm { 
            background: rgba(15, 17, 20, 0.98); backdrop-filter: blur(12px); 
            padding: 15px 30px; position: sticky; top: 0; z-index: 1000; 
            border-bottom: 2px solid #0d6efd; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .card-chamado { 
            background: white; color: #222; border-radius: 15px; 
            min-height: 550px; transition: all 0.3s ease; position: relative; 
            padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); 
            display: flex; flex-direction: column; border: none;
        }
        .sla-bar { height: 8px; width: 100%; position: absolute; top: 0; left: 0; border-radius: 15px 15px 0 0; }
        
        /* Notificação de Nova Mensagem */
        .notif-badge { 
            position: absolute; top: 15px; right: 15px; background: #ff4c4c; 
            color: white; font-size: 0.7rem; font-weight: 900; 
            padding: 2px 8px; border-radius: 20px; animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .desc-box { background: #eef6ff; padding: 12px; border-radius: 8px; font-size: 0.8rem; border-left: 5px solid #0d6efd; margin: 12px 0; color: #333; }
        .solucao-box { background: #e7f5ea; padding: 12px; border-radius: 8px; font-size: 0.8rem; border-left: 5px solid #198754; margin-top: 10px; color: #155724; }
        
        .chat-box { background: #ffffff; border: 1px solid #e9ecef; border-radius: 8px; height: 160px; overflow-y: auto; padding: 10px; margin-bottom: 12px; }
        .msg-tec { color: #0d6efd; text-align: right; margin-bottom: 6px; font-weight: 700; border-bottom: 1px solid #f1f3f5; }
        .msg-user { color: #444; text-align: left; margin-bottom: 6px; background: #f1f3f5; padding: 4px 8px; border-radius: 5px; }
        
        /* Mensagens não lidas destacadas no chat */
        .msg-nao-lida { border-left: 4px solid #ff4c4c !important; background: rgba(255, 76, 76, 0.08) !important; font-weight: 900 !important; }

        .tec-resp { font-size: 0.8rem; font-weight: 900; color: #0d6efd; border-top: 1px solid #eee; padding-top: 10px; margin-top: auto; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header-adm d-flex justify-content-between align-items-center">
    <h5 class="mb-0 fw-bold text-white">COMANDO TI 🛠️ <span id="contadorTotal" class="badge bg-primary ms-2">0</span></h5>
    <div class="d-flex gap-2 align-items-center">
        <select id="filtroStatus" class="form-select form-select-sm bg-dark text-white border-secondary w-auto">
            <option value="Pendentes">Pendentes (Fila Atual)</option>
            <option value="Minha Fila">Meus Atendimentos (Tudo)</option>
            <option value="Abertos">Novos (Sem Técnico)</option>
            <option value="Concluído">Histórico Geral (Concluídos)</option>
        </select>
        <button id="btnPDF" class="btn btn-sm btn-outline-info fw-bold">PDF MENSAL</button>
        <span id="tecLabel" class="badge border border-info text-white p-2"></span>
        <button onclick="localStorage.clear(); location.href='login.html'" class="btn btn-sm btn-danger fw-bold">SAIR</button>
    </div>
</div>

<div class="container-fluid p-4">
    <div id="gridChamados" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 row-cols-xxl-5 g-4"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, doc, updateDoc, where, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const tecNome = localStorage.getItem('tecnicoAtivo');
    if(!tecNome) location.href = 'login.html';
    document.getElementById('tecLabel').innerText = "Técnico: " + tecNome;

    const firebaseConfig = {
        apiKey: "AIzaSyCpXcAHwayq8AN3VR7Sj7VYteAwSluKovo",
        authDomain: "sistema-chamados-c3e61.firebaseapp.com",
        projectId: "sistema-chamados-c3e61",
        storageBucket: "sistema-chamados-c3e61.firebasestorage.app",
        appId: "1:782902435377:web:937600794bd6b7c0397f10"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    function carregarLogo(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement("canvas");
                canvas.width = img.width; canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                resolve(canvas.toDataURL("image/jpeg"));
            };
            img.onerror = () => reject();
            img.src = url;
        });
    }

    document.getElementById('btnPDF').onclick = async () => {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF('l', 'mm', 'a4');
        try {
            const logoData = await carregarLogo('logo.png.jpeg');
            docPDF.addImage(logoData, 'JPEG', 15, 5, 40, 15);
        } catch (e) {}
        
        const q = query(collection(db, "chamados"), where("status", "==", "Concluído"));
        const snap = await getDocs(q);
        const rows = snap.docs.map(d => {
            const c = d.data();
            return [
                c.dataCriacao?.toDate().toLocaleString('pt-BR') || '',
                c.dataFinalizacao?.toDate().toLocaleString('pt-BR') || '',
                `${c.nome} ${c.sobrenome}`,
                c.departamento,
                c.titulo,
                c.solucao || 'N/A'
            ];
        });
        docPDF.autoTable({ startY: 28, head: [['Abertura', 'Finalização', 'Solicitante', 'Setor', 'Assunto', 'Solução']], body: rows });
        docPDF.save(`Relatorio_TI_Delta.pdf`);
    };

    window.capturar = async (id) => {
        if(confirm("Capturar chamado?")) await updateDoc(doc(db, "chamados", id), { status: "Em Atendimento", tecnicoResponsavel: tecNome });
    };

    window.enviarMsg = async (id, msgsAtuais) => {
        const msg = prompt("Sua resposta:");
        if(msg) {
            const agora = new Date().toLocaleString('pt-BR');
            // Ao responder, todas as mensagens anteriores do usuário são marcadas como lidas
            const novasMsgs = msgsAtuais.map(m => ({...m, lido: true}));
            novasMsgs.push({ autor: tecNome, texto: msg, data: agora, lido: true });
            await updateDoc(doc(db, "chamados", id), { mensagens: novasMsgs });
        }
    };

    window.finalizar = async (id) => {
        const sol = prompt("Descrição da Solução:");
        if(sol) {
            await updateDoc(doc(db, "chamados", id), { 
                status: "Concluído", 
                solucao: sol, 
                dataFinalizacao: serverTimestamp() 
            });
        }
    };

    function monitorar() {
        const filtro = document.getElementById('filtroStatus').value;
        const q = query(collection(db, "chamados"), orderBy("dataCriacao", "desc"));

        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('gridChamados');
            grid.innerHTML = '';
            let contador = 0;

            snapshot.forEach((docSnap) => {
                const c = docSnap.data();
                const id = docSnap.id;
                let exibir = false;

                if (filtro === "Minha Fila") {
                    if (c.tecnicoResponsavel === tecNome) exibir = true;
                } else if (filtro === "Abertos") {
                    if (!c.tecnicoResponsavel && c.status === "Aberto") exibir = true;
                } else if (filtro === "Concluído") {
                    if (c.status === "Concluído") exibir = true;
                } else {
                    if (c.status !== "Concluído") exibir = true;
                }

                if (exibir) {
                    contador++;
                    
                    // --- LÓGICA DE NOTIFICAÇÃO (NOVA MENSAGEM) ---
                    const nNaoLidas = c.mensagens?.filter(m => m.autor !== tecNome && m.autor !== "Sistema" && m.lido === false).length || 0;
                    
                    const souDono = (c.tecnicoResponsavel === tecNome);
                    const livre = !c.tecnicoResponsavel;

                    grid.innerHTML += `
                        <div class="col">
                            <div class="card card-chamado shadow-sm">
                                <div class="sla-bar bg-${c.urgencia === 'Alta' ? 'danger' : (c.urgencia === 'Média' ? 'warning' : 'success')}"></div>
                                
                                ${nNaoLidas > 0 ? `<div class="notif-badge">${nNaoLidas} NOVA</div>` : ''}

                                <h6 class="fw-bold text-primary">${c.titulo}</h6>
                                <p class="small mb-1">👤 ${c.nome} ${c.sobrenome}</p>
                                <p class="small text-muted mb-2">🏢 ${c.departamento}</p>
                                <div class="desc-box p-2 mb-2 small"><strong>Problema:</strong> ${c.descricao}</div>
                                
                                <div class="chat-box small">
                                    ${c.mensagens?.map(m => `
                                        <div class="${m.autor === tecNome ? 'msg-tec' : 'msg-user'} ${!m.lido && m.autor !== tecNome ? 'msg-nao-lida' : ''}">
                                            <b>${m.autor}:</b> ${m.texto}
                                        </div>`).join('') || ''}
                                </div>

                                ${c.status === 'Concluído' ? `
                                    <div class="solucao-box">
                                        <strong>✅ Solução Aplicada:</strong><br>${c.solucao || 'Sem descrição cadastrada.'}
                                    </div>
                                ` : ''}

                                <div class="tec-resp">Resp: ${c.tecnicoResponsavel || 'Pendente'}</div>
                                <div class="mt-auto">
                                    ${livre ? `<button class="btn btn-primary btn-sm w-100 fw-bold" onclick="capturar('${id}')">CAPTURAR</button>` : 
                                    (souDono && c.status !== 'Concluído' ? `
                                        <div class="d-flex gap-1">
                                            <button onclick="enviarMsg('${id}', ${JSON.stringify(c.mensagens || []).replace(/"/g, '&quot;')})" class="btn btn-info btn-sm text-white flex-grow-1">RESPONDER</button>
                                            <button class="btn btn-success btn-sm flex-grow-1" onclick="finalizar('${id}')">FINALIZAR</button>
                                        </div>
                                    ` : `<div class="alert alert-secondary p-1 mb-0 text-center small fw-bold">${c.status.toUpperCase()}</div>`)}
                                </div>
                            </div>
                        </div>`;
                }
            });
            document.getElementById('contadorTotal').innerText = contador;
        });
    }

    document.getElementById('filtroStatus').onchange = monitorar;
    monitorar();
</script>
</body>
</html>
