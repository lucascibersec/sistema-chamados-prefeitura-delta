<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso TI - Delta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop'); background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: rgba(15,15,20,0.95); padding: 40px; border-radius: 20px; border: 2px solid #0d6efd; width: 380px; color: white; text-align: center; }
        .form-label { color: #3b82f6; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; display: block; text-align: left; margin-bottom: 5px; }
        .form-select, .form-control { background-color: #212529 !important; color: #ffffff !important; border: 1px solid #444 !important; }
        .input-group-text { background-color: #212529 !important; border: 1px solid #444 !important; color: #3b82f6 !important; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box shadow">
        <h4 class="mb-4 text-primary fw-bold">PAINEL TÉCNICO TI 🛠️</h4>
        <label class="form-label">Técnico</label>
        <select id="tecNome" class="form-select mb-4">
            <option value="" disabled selected>Selecione seu nome...</option>
            <option value="Ramon">Ramon</option><option value="Ezequias">Ezequias</option><option value="Jean">Jean</option><option value="Gustavo">Gustavo</option><option value="Lucas">Lucas</option>
        </select>
        <label class="form-label">Senha</label>
        <div class="input-group mb-4">
            <input type="password" id="tecSenha" class="form-control" placeholder="Sua senha">
            <span class="input-group-text" id="togglePassword"><i class="bi bi-eye-slash" id="iconEye"></i></span>
        </div>
        <button id="btnLogar" class="btn btn-primary w-100 fw-bold py-2">ENTRAR NO SISTEMA</button>
        <div id="errorMsg" class="mt-3 small text-danger fw-bold" style="display: none;">DADOS INCORRETOS!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpXcAHwayq8AN3VR7Sj7VYteAwSluKovo",
            authDomain: "sistema-chamados-c3e61.firebaseapp.com",
            projectId: "sistema-chamados-c3e61",
            storageBucket: "sistema-chamados-c3e61.firebasestorage.app",
            appId: "1:782902435377:web:937600794bd6b7c0397f10"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Olhinho
        const toggle = document.querySelector('#togglePassword');
        if(toggle) {
            toggle.onclick = () => {
                const passInput = document.querySelector('#tecSenha');
                const icon = document.querySelector('#iconEye');
                const type = passInput.type === 'password' ? 'text' : 'password';
                passInput.type = type;
                icon.classList.toggle('bi-eye'); icon.classList.toggle('bi-eye-slash');
            };
        }

        // Login
        const btn = document.getElementById('btnLogar');
        if(btn) {
            btn.onclick = async () => {
                const nome = document.getElementById('tecNome').value;
                const senha = document.getElementById('tecSenha').value;
                if(!nome || !senha) return alert("Preencha tudo!");
                btn.disabled = true; btn.innerText = "VERIFICANDO...";
                try {
                    const q = query(collection(db, "tecnicos"), where("Usuario", "==", nome), where("Senha", "==", senha));
                    const snap = await getDocs(q);
                    if (!snap.empty) {
                        localStorage.setItem('tecnicoAtivo', nome);
                        localStorage.setItem('sessaoAtiva', 'true');
                        window.location.href = 'admin.html';
                    } else {
                        document.getElementById('errorMsg').style.display = "block";
                        btn.disabled = false; btn.innerText = "ENTRAR NO SISTEMA";
                    }
                } catch (e) {
                    alert("Erro ao conectar!");
                    btn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>
