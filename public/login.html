<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito - Gestão em Técnologia</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --primary-color: #1abc9c; 
            --primary-hover: #16a085;
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
            --dark-blue: #0f172a;
        }

        body { 
            background-color: var(--bg-body);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-box { 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 15px; 
            border: 1px solid var(--border-color); 
            width: 100%;
            max-width: 400px; 
            color: var(--text-main); 
            text-align: center; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.5rem;
            color: var(--dark-blue);
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        .brand-logo span { color: var(--primary-color); }
        
        .login-subtitle {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .form-label { 
            color: var(--dark-blue); 
            font-weight: 700; 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            display: block; 
            text-align: left; 
            margin-bottom: 6px; 
        }

        .form-select, .form-control { 
            background-color: #f8fafc !important; 
            color: var(--text-main) !important; 
            border: 1px solid var(--border-color) !important; 
            padding: 12px;
            font-size: 0.95rem;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 0 4px rgba(26, 188, 156, 0.1) !important;
            background-color: #ffffff !important;
        }

        .input-group-text { 
            background-color: #f8fafc !important; 
            border: 1px solid var(--border-color) !important; 
            color: var(--primary-color) !important; 
            cursor: pointer; 
        }

        .btn-logar {
            background-color: var(--dark-blue);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-logar:hover {
            background-color: #000000;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #errorMsg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #fee2e2;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="brand-logo">Gestão  <span>Em Técnologia</span></div>
        <p class="login-subtitle">Área Restrita aos Técnicos de TI</p>
        
        <label class="form-label">Identificação do Técnico</label>
        <select id="tecNome" class="form-select mb-4">
            <option value="" disabled selected>Selecione seu nome...</option>
            <option value="Ramon">Ramon</option>
            <option value="Ezequias">Ezequias</option>
            <option value="Jean">Jean</option>
            <option value="Gustavo">Gustavo</option>
            <option value="Lucas">Lucas</option>
        </select>

        <label class="form-label">Senha de Acesso</label>
        <div class="input-group mb-4">
            <input type="password" id="tecSenha" class="form-control" placeholder="Sua senha secreta">
            <span class="input-group-text" id="togglePassword"><i class="bi bi-eye-slash" id="iconEye"></i></span>
        </div>

        <button id="btnLogar" class="btn-logar">Entrar no Painel</button>
        <div id="errorMsg" class="small fw-bold" style="display: none;">DADOS INCORRETOS OU INVÁLIDOS!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpXcAHwayq8AN3VR7Sj7VYteAwSluKovo",
            authDomain: "sistema-chamados-c3e61.firebaseapp.com",
            projectId: "sistema-chamados-c3e61",
            storageBucket: "sistema-chamados-c3e61.firebasestorage.app",
            appId: "1:782902435377:web:937600794bd6b7c0397f10"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Lógica do Olhinho (Toggle Password)
        const toggle = document.querySelector('#togglePassword');
        if(toggle) {
            toggle.onclick = () => {
                const passInput = document.querySelector('#tecSenha');
                const icon = document.querySelector('#iconEye');
                const type = passInput.type === 'password' ? 'text' : 'password';
                passInput.type = type;
                icon.classList.toggle('bi-eye'); 
                icon.classList.toggle('bi-eye-slash');
            };
        }

        // Lógica de Login via Firestore
        const btn = document.getElementById('btnLogar');
        if(btn) {
            btn.onclick = async () => {
                const nome = document.getElementById('tecNome').value;
                const senha = document.getElementById('tecSenha').value;
                const errorDiv = document.getElementById('errorMsg');
                
                if(!nome || !senha) return alert("Por favor, preencha todos os campos!");
                
                btn.disabled = true; 
                btn.innerText = "VERIFICANDO...";
                errorDiv.style.display = "none";

                try {
                    // Busca na coleção 'tecnicos' onde 'Usuario' e 'Senha' coincidem
                    const q = query(collection(db, "tecnicos"), where("Usuario", "==", nome), where("Senha", "==", senha));
                    const snap = await getDocs(q);
                    
                    if (!snap.empty) {
                        localStorage.setItem('tecnicoAtivo', nome);
                        localStorage.setItem('sessaoAtiva', 'true');
                        window.location.href = 'admin.html';
                    } else {
                        errorDiv.style.display = "block";
                        btn.disabled = false; 
                        btn.innerText = "Entrar no Painel";
                    }
                } catch (e) {
                    console.error(e);
                    alert("Erro ao conectar com o servidor Delta!");
                    btn.disabled = false;
                    btn.innerText = "Entrar no Painel";
                }
            };
        }
    </script>
</body>
</html>
