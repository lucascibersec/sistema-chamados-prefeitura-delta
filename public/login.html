<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Acesso TI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-box { background: rgba(15,15,20,0.95); padding: 40px; border-radius: 20px; border: 1px solid #0d6efd; width: 360px; color: white; text-align: center; }
    </style>
</head>
<body>
    <div class="login-box shadow">
        <h4 class="mb-4 text-primary fw-bold">PAINEL TÉCNICO TI</h4>
        <select id="tecNome" class="form-select bg-dark text-white border-secondary mb-3">
            <option value="" disabled selected>Quem está acessando?</option>
            <option>Ramon</option><option>Ezequias</option><option>Jean</option><option>Gustavo</option><option>Lucas</option>
        </select>
        <button onclick="logar()" class="btn btn-primary w-100 fw-bold">ENTRAR NO SISTEMA</button>
    </div>
    <script>
        function logar() {
            const n = document.getElementById('tecNome').value;
            if(!n) return alert("Por favor, selecione seu nome.");
            localStorage.setItem('tecnicoAtivo', n);
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
