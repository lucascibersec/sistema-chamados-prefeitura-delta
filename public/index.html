<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TI - Sistema de Chamados Delta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos Globais e Fundo */
        body {
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1542831371-29b0f74f9713?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Efeito Vidro no Card */
        .card-glass {
            background: rgba(20, 22, 25, 0.95) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid #0d6efd;
            border-radius: 20px;
            width: 100%;
            max-width: 550px;
            color: white;
            box-shadow: 0 25px 50px rgba(0,0,0,0.7);
            padding: 40px;
            position: relative;
        }

        /* Botão Amarelo de Acompanhamento */
        .btn-ver-meus {
            display: block;
            width: 100%;
            background: #ffc107;
            color: #000;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: 900;
            text-decoration: none;
            margin-bottom: 30px;
            transition: 0.3s;
            border: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.3);
        }

        .btn-ver-meus:hover {
            background: #e0a800;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.5);
        }

        /* Destaque Neon nos Nomes dos Campos */
        .form-label { 
            color: #3b82f6 !important; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            letter-spacing: 1.5px; 
            margin-bottom: 10px;
            display: block;
            text-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
        }

        /* Caixas de Texto Mais Visíveis */
        .form-control, .form-select { 
            background: rgba(255, 255, 255, 0.15) !important; 
            border: 1px solid #444 !important; 
            color: white !important; 
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: #0d6efd !important;
            box-shadow: 0 0 15px rgba(13, 110, 253, 0.5);
            background: rgba(255, 255, 255, 0.2) !important;
        }

        /* Texto de Exemplo (Placeholder) Muito Visível */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.8) !important;
            opacity: 1;
        }

        /* Botões de Urgência Coloridos */
        .urgencia-group .btn-outline-success { border-color: #198754; color: #198754; }
        .urgencia-group .btn-outline-warning { border-color: #ffc107; color: #ffc107; }
        .urgencia-group .btn-outline-danger { border-color: #dc3545; color: #dc3545; }

        .btn-check:checked + .btn-outline-success { background-color: #198754 !important; color: white !important; }
        .btn-check:checked + .btn-outline-warning { background-color: #ffc107 !important; color: black !important; }
        .btn-check:checked + .btn-outline-danger { background-color: #dc3545 !important; color: white !important; }

        /* Botão Enviar com Gradiente */
        .btn-enviar {
            background: linear-gradient(45deg, #0d6efd, #004fb1);
            border: none;
            padding: 16px;
            font-weight: 900;
            border-radius: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.4s;
            margin-top: 15px;
        }

        .btn-enviar:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(13, 110, 253, 0.5);
        }

        /* Mensagem de Feedback na Parte de Baixo */
        #msgFeedback {
            display: none;
            padding: 18px;
            border-radius: 15px;
            text-align: center;
            margin-top: 25px;
            font-weight: 900;
            font-size: 1rem;
            border: 2px solid rgba(40, 167, 69, 0.5);
            background: rgba(40, 167, 69, 0.15);
        }

        /* Ajuste das Opções do Select */
        select option { background: #1a1a1a; color: white; padding: 10px; }
    </style>
</head>
<body>

    <div class="card card-glass shadow">
        <a href="acompanhar.html" class="btn-ver-meus">🔎 ACOMPANHAR MEUS CHAMADOS</a>

        <div class="text-center mb-4">
            <h4 class="text-primary fw-bold mb-0">SUPORTE TÉCNICO PREFEITURA DE DELTA 🛠️</h4>
            <p class="small text-white mt-2" style="opacity: 0.8;">Equipe: Ramon, Ezequias, Jean, Gustavo e Lucas</p>
        </div>

        <form id="formChamado">
            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: Lucas" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Sobre nome</label>
                    <input type="text" id="sobrenome" class="form-control" placeholder="Ex: Barbosa" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">Departamento / Secretaria</label>
                <select id="departamento" class="form-select" required>
                    <option value="" disabled selected>Onde você está localizado?</option>
                    <option>Administração e Planejamento</option>
                    <option>Secretaria de Governo</option>
                    <option>Agricultura e Pecuária</option>
                    <option>Água e Saneamento (SAAE)</option>
                    <option>Almoxarifado Geral</option>
                    <option>Assistência Social / CRAS</option>
                    <option>Câmara Municipal</option>
                    <option>Comunicação e Eventos</option>
                    <option>Cultura e Turismo</option>
                    <option>Educação e Ensino</option>
                    <option>Esportes e Lazer</option>
                    <option>Fazenda e Finanças</option>
                    <option>Gabinete do Prefeito</option>
                    <option>Habitação e Urbanismo</option>
                    <option>Jurídico / Procuradoria</option>
                    <option>Meio Ambiente</option>
                    <option>Obras e Infraestrutura</option>
                    <option>Recursos Humanos (RH)</option>
                    <option>Saúde / UBS / Hospital</option>
                    <option>Segurança Pública / Guarda</option>
                    <option>TI / Suporte Tecnológico</option>
                    <option>Transportes e Frota</option>
                    <option>Vigilância Sanitária</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Tipo de Problema (Tópico)</label>
                <select id="titulo" class="form-select" required>
                    <option value="" disabled selected>Selecione o que precisa de reparo...</option>
                    <option>Computador não liga ou Lento</option>
                    <option>Configuração de E-mail / Outlook</option>
                    <option>Impressora (Papel preso / Tonner)</option>
                    <option>Instalação de Software / Programas</option>
                    <option>Internet Caindo / Sem Wi-Fi</option>
                    <option>Rede Interna / Pastas Compartilhadas</option>
                    <option>Sistema da Prefeitura (Erro de Login)</option>
                    <option>Telefone Fixo / Ramal com Ruído</option>
                    <option>Vírus / Mensagens Suspeitas</option>
                    <option>Outros (Descrever abaixo)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="form-label">Descrição Detalhada do Erro</label>
                <textarea id="descricao" class="form-control" rows="3" placeholder="Ex: A impressora do RH está puxando duas folhas e travando no meio..." required></textarea>
            </div>

            <div class="mb-4 text-center">
                <label class="form-label d-block">Qual a Urgência deste pedido?</label>
                <div class="btn-group w-100 urgencia-group">
                    <input type="radio" class="btn-check" name="urgencia" id="urg-baixa" value="Baixa" checked>
                    <label class="btn btn-outline-success" for="urg-baixa">BAIXA</label>
                    
                    <input type="radio" class="btn-check" name="urgencia" id="urg-media" value="Média">
                    <label class="btn btn-outline-warning" for="urg-media">MÉDIA</label>
                    
                    <input type="radio" class="btn-check" name="urgencia" id="urg-alta" value="Alta">
                    <label class="btn btn-outline-danger" for="urg-alta">ALTA</label>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-primary w-100">SOLICITAR ATENDIMENTO AGORA</button>
            
            <div id="msgFeedback"></div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpXcAHwayq8AN3VR7Sj7VYteAwSluKovo",
            authDomain: "sistema-chamados-c3e61.firebaseapp.com",
            projectId: "sistema-chamados-c3e61",
            storageBucket: "sistema-chamados-c3e61.firebasestorage.app",
            messagingSenderId: "782902435377",
            appId: "1:782902435377:web:937600794bd6b7c0397f10"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const form = document.getElementById('formChamado');
        const feedback = document.getElementById('msgFeedback');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;

            try {
                // Captura a data e hora atual do sistema para o chat inicial
                const agora = new Date().toLocaleString('pt-BR');

                await addDoc(collection(db, "chamados"), {
                    nome: document.getElementById('nome').value,
                    sobrenome: document.getElementById('sobrenome').value,
                    departamento: document.getElementById('departamento').value,
                    titulo: document.getElementById('titulo').value,
                    descricao: document.getElementById('descricao').value,
                    urgencia: document.querySelector('input[name="urgencia"]:checked').value,
                    status: "Aberto",
                    mensagens: [{
                        autor: "Sistema",
                        texto: "Chamado registrado com sucesso.",
                        data: agora
                    }],
                    dataCriacao: serverTimestamp()
                });

                // Mostra Feedback de Sucesso
                feedback.style.display = "block";
                feedback.style.color = "#28a745";
                feedback.innerText = "CHAMADO ENVIADO COM SUCESSO! ✅";
                
                form.reset();
                setTimeout(() => { feedback.style.display = "none"; }, 8000);

            } catch (err) {
                console.error(err);
                alert("Erro ao conectar com o banco. Tente novamente.");
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
