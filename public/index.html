<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suporte Técnico Prefeitura de Delta </title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --primary-color: #1abc9c; 
            --primary-hover: #16a085;
            --bg-body: #f1f5f9;
            --text-main: #1e293b;
            --border-color: #cbd5e1;
        }

        body { 
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .main-card {
            background: #ffffff;
            border-radius: 20px;
            border: 2px solid var(--border-color);
            width: 100%;
            max-width: 550px;
            padding: 35px;
            color: var(--text-main);
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
        }

        /* BOTÃO ACOMPANHAR COM DESTAQUE */
        .btn-ver-meus {
            display: block;
            width: 100%;
            background: var(--primary-color);
            color: #ffffff;
            text-align: center;
            padding: 14px;
            border-radius: 12px;
            font-weight: 900;
            text-decoration: none;
            margin-bottom: 25px;
            transition: 0.3s;
            font-size: 1rem;
            text-transform: uppercase;
        }
        .btn-ver-meus:hover { background: var(--primary-hover); color: white; transform: translateY(-2px); }

        .brand-header { text-align: center; margin-bottom: 25px; }

        /* DESTAQUE DO TÍTULO DE ABERTURA */
        .brand-header h4 {
            color: var(--primary-color); 
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-label { 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            letter-spacing: 1px; 
            margin-bottom: 8px;
            display: block;
        }

        .form-control, .form-select { 
            background: #f8fafc !important; 
            border: 1px solid var(--border-color) !important; 
            padding: 12px;
            border-radius: 10px;
            font-size: 0.95rem;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary-color) !important;
            box-shadow: 0 0 10px rgba(26, 188, 156, 0.2);
        }

        .urgencia-group .btn { font-weight: 800; font-size: 0.8rem; padding: 10px; }
        .btn-check:checked + .btn-outline-success { background-color: #198754 !important; color: white !important; }
        .btn-check:checked + .btn-outline-warning { background-color: #f59e0b !important; color: white !important; }
        .btn-check:checked + .btn-outline-danger { background-color: #dc3545 !important; color: white !important; }

        .btn-enviar {
            background: #0f172a;
            color: white;
            border: none;
            padding: 16px;
            font-weight: 900;
            border-radius: 12px;
            text-transform: uppercase;
            width: 100%;
            margin-top: 10px;
            transition: 0.3s;
        }
        .btn-enviar:hover { background: #000; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="main-card">
        <a href="acompanhar.html" class="btn-ver-meus">🔎 ACOMPANHAR MEUS CHAMADOS</a>

        <div class="brand-header">
            <h4 class="mb-0">Gestão e Suporte em Técnologia 🛠️</h4>
            <p class="small mt-1 text-muted" style="font-weight: 600;"> Ezequias, Jean, Ramon, Gustavo, Lucas</p>
        </div>

        <form id="formChamado">
            <div class="row g-2 mb-3">
                <div class="col-6">
                    <label class="form-label">Nome</label>
                    <input type="text" id="nome" class="form-control" placeholder="Mateus" required>
                </div>
                <div class="col-6">
                    <label class="form-label">Sobrenome</label>
                    <input type="text" id="sobrenome" class="form-control" placeholder="Silva" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Departamento / Secretaria</label>
                <select id="departamento" class="form-select" required>
                    <option value="" disabled selected>Selecione o local...</option>
                    <option>Administração e Planejamento</option>
                    <option>Arquivos</option>
                    <option>Água e Saneamento</option>
                    <option>Almoxarifado Geral</option>
                    <option>Assistência Social / CRAS</option>
                    <option>Câmara Municipal</option>
                    <option>Comunicação e Eventos</option>
                    <option>Cultura e Turismo</option>
                    <option>EE Ivan Mattar Soukef</option>
                    <option>EM Ana de Castro Cançado</option>
                    <option>Escola Municipal Olavo de Oliveira Ferreira</option>
                    <option>CEMEI Patrícia Aparecida Dias</option>
                    <option>Centro Municipal de Educação Infantil Ariane Depeatriz</option>
                    <option>Clinica de Especialidades</option>
                    <option>Esportes e Lazer</option>
                    <option>Esf1</option>
                    <option>Esf2</option>
                    <option>Esf3</option>
                    <option>Fazenda e Finanças</option>
                    <option>Gabinete do Prefeito</option>
                    <option>Jurídico / Procuradoria</option>
                    <option>Meio Ambiente</option>
                    <option>Obras e Infraestrutura</option>
                    <option>Posto de Saúde Geraldo Salge</option>
                    <option>Recursos Humanos (RH)</option>
                    <option>Secretaria de Saúde</option>
                    <option>Secretaria de Governo</option>
                    <option>Secretaria de Compras</option>
                    <option>Segurança Pública / Guarda</option>
                    <option>Transportes e Frota</option>
                    <option>Vigilância / Zonose</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Tipo de Problema (Tópico)</label>
                <select id="titulo" class="form-select" required>
                    <option value="" disabled selected>Selecione o reparo...</option>
                    <option>Computador não liga ou Lento</option>
                    <option>Configuração de E-mail / Gmail</option>
                    <option>Impressora (Papel preso / Tonner)</option>
                    <option>Instalação de Software / Programas</option>
                    <option>Internet Caindo / Sem Wi-Fi</option>
                    <option>Rede Interna / Pastas Compartilhadas</option>
                    <option>Sistema da Prefeitura (Erro de Login)</option>
                    <option>Telefone Fixo / Ramal com Ruído</option>
                    <option>Vírus / Mensagens Suspeitas</option>
                    <option>Outros (Descrever abaixo)</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Descrição Detalhada</label>
                <textarea id="descricao" class="form-control" rows="3" placeholder="Descreva o problema..." required></textarea>
            </div>

            <div class="mb-4 text-center">
                <label class="form-label d-block">Urgência</label>
                <div class="btn-group w-100 urgencia-group">
                    <input type="radio" class="btn-check" name="urgencia" id="urg-baixa" value="Baixa" checked>
                    <label class="btn btn-outline-success" for="urg-baixa">BAIXA</label>
                    
                    <input type="radio" class="btn-check" name="urgencia" id="urg-media" value="Média">
                    <label class="btn btn-outline-warning" for="urg-media">MÉDIA</label>
                    
                    <input type="radio" class="btn-check" name="urgencia" id="urg-alta" value="Alta">
                    <label class="btn btn-outline-danger" for="urg-alta">ALTA</label>
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="btn-enviar">Solicitar Atendimento</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCpXcAHwayq8AN3VR7Sj7VYteAwSluKovo",
            authDomain: "sistema-chamados-c3e61.firebaseapp.com",
            projectId: "sistema-chamados-c3e61",
            storageBucket: "sistema-chamados-c3e61.firebasestorage.app",
            appId: "1:782902435377:web:937600794bd6b7c0397f10"
        };

        const db = getFirestore(initializeApp(firebaseConfig));

        document.getElementById('formChamado').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "ENVIANDO...";

            try {
                await addDoc(collection(db, "chamados"), {
                    nome: document.getElementById('nome').value,
                    sobrenome: document.getElementById('sobrenome').value,
                    departamento: document.getElementById('departamento').value,
                    titulo: document.getElementById('titulo').value,
                    descricao: document.getElementById('descricao').value,
                    urgencia: document.querySelector('input[name="urgencia"]:checked').value,
                    status: "Aberto",
                    dataCriacao: serverTimestamp(),
                    mensagens: [{ autor: "Sistema", texto: "Chamado registrado com sucesso.", data: new Date().toLocaleString('pt-BR') }]
                });
                alert("Enviado com sucesso!");
                location.reload();
            } catch (err) {
                alert("Erro ao enviar.");
                btn.disabled = false;
                btn.innerText = "Solicitar Atendimento";
            }
        };
    </script>
</body>
</html>
